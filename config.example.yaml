# ===========================================
# 文件更名器 - 配置文件 (v1.1 多目录支持)
# ===========================================

# 操作日志文件路径
log_file: "./rename_operations.log"

# 操作历史记录文件 (用于回滚)
history_file: "./rename_history.json"

# 轮询间隔（秒）
poll_interval: 1.0

# 防抖时间（秒）- 文件创建后初始等待时间
debounce_seconds: 2.0

# 文件大小稳定性检查次数
stability_checks: 3

# 日志与历史按天轮转
log_daily_rotate: false

# 全局忽略的文件名模式 (每个目录也可以单独配置)
ignored_patterns:
  - "*.tmp"
  - "*.crdownload"
  - "~*"
  - ".DS_Store"
  - "Thumbs.db"

# ===========================================
# 多目录监控配置
# 每个目录可以有自己的规则，未指定规则时使用全局规则
# ===========================================
watch_dirs:
  - path: "./test_screenshots"
    label: "截图目录"
    rules:
      - name: "截图按时间重命名"
        priority: 1
        conditions:
          - type: "filename_pattern"
            pattern: "截图*"
          - type: "extension"
            values: [".png", ".jpg", ".jpeg"]
        rename_pattern: "截图_{datetime:%Y%m%d_%H%M%S}{ext}"

      - name: "QQ/微信截图重命名"
        priority: 2
        conditions:
          - type: "filename_pattern"
            pattern: "QQ截图*"
          - type: "extension"
            values: [".png", ".jpg", ".jpeg"]
        rename_pattern: "截图_{datetime:%Y%m%d_%H%M%S}{ext}"

      - name: "图片添加主色调"
        priority: 10
        conditions:
          - type: "is_image"
          - type: "file_size"
            max_size: "5MB"
        rename_pattern: "{name}_{dominant_color}{ext}"

  - path: "./test_downloads"
    label: "下载目录"
    rules:
      - name: "下载图片加主色调"
        priority: 10
        conditions:
          - type: "is_image"
          - type: "source_dir"
            source_dir: "*下载*"
        rename_pattern: "{source_dir}_{name}_{dominant_color}{ext}"

      - name: "下载大文件加日期"
        priority: 15
        conditions:
          - type: "file_size"
            min_size: "1MB"
          - type: "source_dir"
            source_dir: "*下载*"
        rename_pattern: "{date}_{original_name}"

      - name: "发票文件按编号重命名"
        priority: 5
        enabled: false
        conditions:
          - type: "filename_regex"
            pattern: "^(.+)_(\\d{8})_发票(\\d+)\\.(pdf|jpg|png)$"
          - type: "source_dir"
            source_dir: "*下载*"
        rename_pattern: "发票_{capture:2}_{capture:3}_{datetime:%H%M%S}{ext}"

# ===========================================
# 兼容旧版单目录配置 (如果不用 watch_dirs):
#   watch_dir: "./test_watch"
#   rules:
#     - name: "全局规则"
#       ...
# ===========================================

# ===========================================
# 模板变量说明
# ===========================================
# 基础变量:
#   {name}              - 原始文件名（不含扩展名）
#   {ext}               - 原始扩展名（含点号，如 .png）
#   {original_name}     - 原始完整文件名
#   {date}              - 当前日期 (YYYYMMDD)
#   {time}              - 当前时间 (HHMMSS)
#   {datetime:格式}      - 自定义日期格式
#   {dominant_color}    - 图片主色调中文名
#
# 分组/捕获变量:
#   {source_dir}        - 文件所在目录名
#   {source_path}       - 文件所在完整目录路径
#   {capture:N}         - filename_regex 正则捕获组 N (从1开始)
#   {capture:name}      - 命名捕获组 (?P<name>...)
#
# 条件类型:
#   filename_pattern  - glob 通配符
#   filename_regex    - 正则表达式 (同时产生捕获组)
#   extension         - 文件扩展名列表
#   is_image          - 判断是否为图片
#   file_size         - 文件大小范围 (支持 "128KB", "5MB")
#   created_after     - 创建时间晚于 (如 "1h", "30m", "2d")
#   created_before    - 创建时间早于
#   source_dir        - 来源目录名匹配 (支持子目录递归)
#
# 命令:
#   daemon    - 守护进程 (多目录并行监控)
#   scan      - 单次扫描全部目录
#   preview   - 预览匹配结果 (--changed 只看改名)
#   rollback  - 回滚操作 (跨天搜索)
#   query     - 查询历史 (-d 起 -D 止 / -r 规则 / -k 关键字)
#   stats     - 统计汇总 (-g date|rule|source)
#   export    - 导出 csv/json (-f csv|json)
#   status    - 查看状态